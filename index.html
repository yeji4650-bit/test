<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인생역전 로또 추첨기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>로또 추첨기</h1>
    <div id="result" class="ball-container">
      <div class="placeholder">번호를 추출해 보세요!</div>
    </div>
    <div class="bonus-wrapper" id="bonus-wrapper" style="display: none;">
      <span class="bonus-text">보너스 번호</span>
      <div id="bonus" class="ball-container"></div>
    </div>
    <button id="draw-btn">추첨하기</button>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
