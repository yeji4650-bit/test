<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴문의 - 로또 번호 추첨기</title>
  <meta name="description" content="로또 번호 추첨기 광고 및 제휴 문의 페이지입니다." />
  <meta name="google-adsense-account" content="ca-pub-2824802689617683">
  <link href='/style.css' rel='stylesheet'>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2824802689617683" crossorigin="anonymous"></script>
  <!-- Google tag (gtag.js) -->

    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">로또 추첨기</a>
      <nav class="header-nav">
        <a href="/">홈</a>
        <a href="/about.html">서비스 소개</a>
        <a href="/contact.html" class="active">제휴문의</a>
      </nav>
      <button id="theme-toggle" class="theme-btn">다크모드</button>
    </div>
  </header>

  <main class="main-wrap">
    <section class="info-section" style="padding-top: 3rem;">
      <div class="info-inner" style="max-width: 560px;">
        <h1>제휴 문의</h1>
        <p class="subtitle">광고 및 제휴 관련 문의를 남겨주세요. 빠르게 답변드리겠습니다.</p>

        <form id="contact-form" action="https://formspree.io/f/xaqvbgvo" method="POST">
          <div class="form-group">
            <label for="name">이름 *</label>
            <input type="text" id="name" name="name" placeholder="홍길동" required />
          </div>
          <div class="form-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" name="email" placeholder="example@email.com" required />
          </div>
          <div class="form-group">
            <label for="company">회사 / 사이트명</label>
            <input type="text" id="company" name="company" placeholder="(주)예시컴퍼니" />
          </div>
          <div class="form-group">
            <label for="type">제휴 유형 *</label>
            <select id="type" name="type" required>
              <option value="" disabled selected>선택해 주세요</option>
              <option value="광고">광고</option>
              <option value="콘텐츠 제휴">콘텐츠 제휴</option>
              <option value="링크 교환">링크 교환</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">문의 내용 *</label>
            <textarea id="message" name="message" placeholder="제휴 관련 내용을 자유롭게 작성해 주세요." required></textarea>
          </div>

          <button type="submit" class="submit-btn" id="submit-btn">문의 보내기</button>
          <div class="success-msg" id="success-msg">문의가 정상적으로 접수되었습니다. 감사합니다!</div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <nav class="footer-nav">
        <a href="/">홈</a>
        <a href="/about.html">서비스 소개</a>
        <a href="/contact.html">제휴문의</a>
        <a href="/privacy.html">개인정보처리방침</a>
      </nav>
      <p class="footer-copy">© 2025 로또 추첨기. 본 서비스의 번호는 참고용이며 당첨을 보장하지 않습니다.</p>
    </div>
  </footer>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      themeToggle.textContent = '라이트모드';
    }
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeToggle.textContent = isDark ? '라이트모드' : '다크모드';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const form = document.getElementById('contact-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.textContent = '전송 중...';
      btn.disabled = true;

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { Accept: 'application/json' },
        });
        if (res.ok) {
          form.reset();
          document.getElementById('success-msg').style.display = 'block';
          btn.textContent = '전송 완료';
        } else {
          btn.textContent = '오류 발생, 다시 시도해 주세요';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = '오류 발생, 다시 시도해 주세요';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
