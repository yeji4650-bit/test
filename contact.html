<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제휴문의 - 로또 추첨기</title>
  <meta name="google-adsense-account" content="ca-pub-2824802689617683">
  <link href='/style.css' rel='stylesheet'>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2824802689617683" crossorigin="anonymous"></script>
  <style>
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--label-color);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 10px 14px;
      border: 1.5px solid var(--input-border);
      border-radius: 10px;
      background-color: var(--input-bg);
      color: var(--input-color);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s, background-color 0.3s, color 0.3s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--btn-bg);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }

    .form-group select {
      appearance: none;
      cursor: pointer;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: var(--btn-bg);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .success-msg {
      display: none;
      background-color: #e8f5e9;
      color: #2e7d32;
      border-radius: 10px;
      padding: 14px;
      margin-top: 16px;
      font-size: 0.9rem;
    }

    body.dark .success-msg {
      background-color: #1b5e20;
      color: #a5d6a7;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: var(--placeholder-color);
      margin-bottom: 1.8rem;
      transition: color 0.3s;
    }
  </style>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" class="theme-btn">다크모드</button>
    <a href="/" class="back-link">← 로또 추첨기로 돌아가기</a>
    <h1>제휴 문의</h1>
    <p class="subtitle">광고 및 제휴 관련 문의를 남겨주세요. 빠르게 답변드리겠습니다.</p>

    <form id="contact-form" action="https://formspree.io/f/xaqvbgvo" method="POST">
      <div class="form-group">
        <label for="name">이름 *</label>
        <input type="text" id="name" name="name" placeholder="홍길동" required />
      </div>
      <div class="form-group">
        <label for="email">이메일 *</label>
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>
      <div class="form-group">
        <label for="company">회사 / 사이트명</label>
        <input type="text" id="company" name="company" placeholder="(주)예시컴퍼니" />
      </div>
      <div class="form-group">
        <label for="type">제휴 유형 *</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>선택해 주세요</option>
          <option value="광고">광고</option>
          <option value="콘텐츠 제휴">콘텐츠 제휴</option>
          <option value="링크 교환">링크 교환</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">문의 내용 *</label>
        <textarea id="message" name="message" placeholder="제휴 관련 내용을 자유롭게 작성해 주세요." required></textarea>
      </div>

      <button type="submit" id="draw-btn">문의 보내기</button>
      <div class="success-msg" id="success-msg">문의가 정상적으로 접수되었습니다. 감사합니다!</div>
    </form>
  </div>
  <script>
    const themeToggle = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
      themeToggle.textContent = '라이트모드';
    }
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      themeToggle.textContent = isDark ? '라이트모드' : '다크모드';
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    const form = document.getElementById('contact-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('draw-btn');
      btn.textContent = '전송 중...';
      btn.disabled = true;

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { Accept: 'application/json' },
        });
        if (res.ok) {
          form.reset();
          document.getElementById('success-msg').style.display = 'block';
          btn.textContent = '전송 완료';
        } else {
          btn.textContent = '오류 발생, 다시 시도해 주세요';
          btn.disabled = false;
        }
      } catch {
        btn.textContent = '오류 발생, 다시 시도해 주세요';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
